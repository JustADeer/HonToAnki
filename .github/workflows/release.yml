name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  set-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - id: extract
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

  windows:
    needs: set-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install briefcase
      - name: Inject version from tag
        shell: bash
        run: sed -i "s/^version = .*/version = \"${{ needs.set-version.outputs.version }}\"/" pyproject.toml
      - run: python build.py windows
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/
          if-no-files-found: error

  macos:
    needs: set-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install briefcase
      - name: Build unidic-lite from source (no arm64 wheel)
        run: pip install unidic-lite --no-binary unidic-lite
      - name: Inject version from tag
        run: sed -i "" "s/^version = .*/version = \"${{ needs.set-version.outputs.version }}\"/" pyproject.toml
      - run: python build.py macos
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/
          if-no-files-found: error

  linux:
    needs: set-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip3 install briefcase
      - name: Inject version from tag
        run: sed -i "s/^version = .*/version = \"${{ needs.set-version.outputs.version }}\"/" pyproject.toml
      - name: Build
        run: python3 build.py linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/
          if-no-files-found: error

  release:
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            windows/*.msi
            windows/*.zip
            macos/*.pkg
            macos/*.zip
            linux/*.AppImage
            linux/*.deb
            linux/*.rpm
